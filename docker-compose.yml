version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: absensi_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password_placeholder
      MARIADB_DATABASE: attendance_system
    volumes:
      - db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - absensi_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absensi_web
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root_password_placeholder
      DB_NAME: attendance_system
    volumes:
      - uploads_data:/var/www/html/src/uploads
    depends_on:
      - db
    networks:
      - absensi_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: absensi_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password_placeholder
    depends_on:
      - db
    networks:
      - absensi_network

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: absensi_filebrowser
    restart: always
    ports:
      - "8082:80"
    volumes:
      - /home/liali/nas-storage:/srv
      - filebrowser_db:/database
    environment:
      - FB_DATABASE=/database/filebrowser.db
    networks:
      - absensi_network

volumes:
  db_data:
  uploads_data:
  filebrowser_db:

networks:
  absensi_network:
    driver: bridge
